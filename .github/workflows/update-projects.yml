name: Update Projects

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch GitHub Projects
        env:
          GITHUB_USERNAME: lilahamri
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-projects.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet client/public/data/projects.json; then
            echo "✅ Aucune modification dans projects.json"
          else
            echo "📝 Mise à jour des projets..."
            git add client/public/data/projects.json
            git commit -m "chore: update projects from GitHub [skip ci]"
            git push
          fi
